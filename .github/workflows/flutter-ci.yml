name: Flutter CI

# Declenche sur chaque PR et push vers main/develop
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

env:
  FLUTTER_VERSION: '3.22.3'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. Analyze + format check
  # ─────────────────────────────────────────────
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze (fatal-infos)
        run: flutter analyze --fatal-infos

  # ─────────────────────────────────────────────
  # 2. Tests unitaires & widget + couverture
  # ─────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit & widget tests (with coverage)
        run: |
          flutter test \
            --coverage \
            --coverage-path=coverage/lcov.info \
            --reporter=expanded \
            --timeout=60s

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Coverage summary
        run: lcov --summary coverage/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: unittests
          name: copiqpolice-coverage
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # 3. Build Android (verification compile-time)
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android (debug check)
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK (debug)
        run: |
          flutter build apk \
            --debug \
            --dart-define=SENTRY_DSN="" \
            --dart-define=POSTHOG_API_KEY=""

  # ─────────────────────────────────────────────
  # 4. Build iOS (verification compile-time)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS (debug check)
    runs-on: macos-latest
    needs: [analyze, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: |
          flutter build ios \
            --debug \
            --no-codesign \
            --dart-define=SENTRY_DSN="" \
            --dart-define=POSTHOG_API_KEY=""

  # ─────────────────────────────────────────────
  # 5. Maestro E2E (Android émulateur)
  #    Sur push main uniquement — pas sur PR
  # ─────────────────────────────────────────────
  e2e-maestro:
    name: E2E Maestro (Android)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-android]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Java (émulateur Android)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build debug APK
        run: |
          flutter build apk \
            --debug \
            --dart-define=SENTRY_DSN="" \
            --dart-define=POSTHOG_API_KEY="" \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"

      - name: Run Maestro E2E on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: e2e_pixel6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            mkdir -p test-results
            adb install build/app/outputs/flutter-apk/app-debug.apk

            curl -Ls "https://get.maestro.mobile.dev" | bash
            export PATH="$HOME/.maestro/bin:$PATH"

            for flow in 01_signup 02_onboarding 03_premier_cas 04_correction 05_appeal 06_paywall 07_achat 08_leaderboard 09_partage; do
              maestro test ".maestro/flows/${flow}.yaml" \
                --env TEST_EMAIL="${{ secrets.E2E_TEST_EMAIL }}" \
                --env TEST_PASSWORD="${{ secrets.E2E_TEST_PASSWORD }}" \
                --format junit \
                --output "test-results/${flow}.xml" || true
            done

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-e2e-results
          path: test-results/

      - name: Upload Maestro screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          path: ~/.maestro/tests/
