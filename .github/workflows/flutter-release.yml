name: Flutter Release

# Declenche sur un tag vX.Y.Z (ex : v1.0.0, v1.2.3)
# Usage : git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  FLUTTER_VERSION: '3.22.3'

jobs:
  # ─────────────────────────────────────────────
  # 1. Build + sign Android (AAB + APK)
  # ─────────────────────────────────────────────
  build-android:
    name: Build & Sign Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Build Android App Bundle (release signe)
        run: |
          flutter build appbundle \
            --release \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=SENTRY_ENV="production" \
            --dart-define=APP_RELEASE="${{ github.ref_name }}" \
            --dart-define=POSTHOG_API_KEY="${{ secrets.POSTHOG_API_KEY }}"

      - name: Build Android APK (release signe)
        run: |
          flutter build apk \
            --release \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=SENTRY_ENV="production" \
            --dart-define=APP_RELEASE="${{ github.ref_name }}" \
            --dart-define=POSTHOG_API_KEY="${{ secrets.POSTHOG_API_KEY }}"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  # ─────────────────────────────────────────────
  # 2. Build + sign iOS (IPA via Fastlane)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build & Sign iOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: fastlane

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS via Fastlane
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          APP_RELEASE: ${{ github.ref_name }}
        run: |
          cd fastlane
          bundle exec fastlane ios build_release

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/ipa/*.ipa
          retention-days: 7

  # ─────────────────────────────────────────────
  # 3. Upload Sentry source-maps
  # ─────────────────────────────────────────────
  sentry-sourcemaps:
    name: Sentry Source-maps
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get

      - name: Install Sentry CLI
        run: npm install -g @sentry/cli

      - name: Build avec split-debug-info (symbols Dart)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties << EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=keystore.jks
          EOF
          flutter build apk \
            --release \
            --split-debug-info=.dart_tool/sentry-symbols \
            --obfuscate \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}"

      - name: Upload debug symbols + creer release Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          sentry-cli debug-files upload \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            .dart_tool/sentry-symbols

          sentry-cli releases new \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            "copiqpolice@${{ github.ref_name }}"

          sentry-cli releases finalize \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            "copiqpolice@${{ github.ref_name }}"

          sentry-cli releases deploys \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            "copiqpolice@${{ github.ref_name }}" new \
            --env production

  # ─────────────────────────────────────────────
  # 4. Deploy Play Store (internal track)
  # ─────────────────────────────────────────────
  deploy-android:
    name: Deploy Play Store (internal)
    runs-on: ubuntu-latest
    needs: [sentry-sourcemaps]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: fastlane

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/

      - name: Upload to Play Store (internal track)
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          echo "$GOOGLE_PLAY_JSON_KEY" > fastlane/google-play-key.json
          cd fastlane
          bundle exec fastlane android deploy_internal

  # ─────────────────────────────────────────────
  # 5. Deploy TestFlight
  # ─────────────────────────────────────────────
  deploy-ios:
    name: Deploy TestFlight
    runs-on: macos-latest
    needs: [sentry-sourcemaps]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: fastlane

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: build/ios/ipa/

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          cd fastlane
          bundle exec fastlane ios upload_testflight

  # ─────────────────────────────────────────────
  # 6. GitHub Release + changelog auto
  # ─────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-android, deploy-ios]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: artifacts/android/

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: artifacts/ios/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty="- %s (%h)" "$PREV_TAG"..HEAD)
          else
            CHANGELOG=$(git log --pretty="- %s (%h)" HEAD)
          fi
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          echo "changelog=$CHANGELOG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "COP'IQ ${{ github.ref_name }}"
          body: |
            ## Changements
            ${{ steps.changelog.outputs.changelog }}

            ## Telechargements
            | Plateforme | Fichier |
            |---|---|
            | Android APK | app-release.apk |
            | Android AAB | app-release.aab (Play Store) |
            | iOS | Disponible sur TestFlight |
          files: |
            artifacts/android/flutter-apk/app-release.apk
            artifacts/android/bundle/release/app-release.aab
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
