name: copiqpolice
description: "COP’IQ - Application scolaire de préparation pour la Police Nationale"
publish_to: "none"

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # CODE-082 : i18n — date/number formatting, ARB-generated strings
  intl: 0.20.2
  # --- runtime packages ---
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  google_fonts: ^8.1.0
  permission_handler: ^12.0.1
  supabase_flutter: ^2.12.4
  flutter_riverpod: ^3.3.1
  hive_flutter: ^1.1.0
  like_button: ^2.1.0
  particles_flutter: ^2.0.2
  vibration: ^3.1.8
  flutter_localization: ^0.4.0
  hive: ^2.2.3
  audioplayers: ^6.6.0
  lib: ^0.3.0
  package_info_plus: 9.0.1
  lottie: ^3.3.3
  flutter_animate: ^4.5.2
  flutter_animated_button: ^2.0.4
  go_router: ^17.2.2
  uuid: ^4.5.3
  image_picker: ^1.2.1
  # Monetisation utilisateurs gratuits (interstitial fin de quiz + rewarded)
  google_mobile_ads: ^5.2.0
  # Notifications locales (rappel quotidien, fin de quiz)
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  # Deep links + universal links
  app_links: ^6.3.2
  # Analytics + crash reporting
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  firebase_messaging: ^15.1.3
  # CODE-069 : partage de score (capture RepaintBoundary → PNG → share natif)
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  # CODE-070 : export PDF de la copie corrigée (A4 + entête COP'IQ + watermark)
  pdf: ^3.11.1
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.6
  http: ^1.2.0
  yaml: ^3.1.2

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon_profile/
    - assets/splash/
    - assets/sfx/
    - assets/images_pa/
    - assets/quiz/culture_generale/quiz_histoire_france_merged.json



  # —— POLICES ——
  fonts:
    - family: InstrumentSans
      fonts:
        - asset: assets/fonts/InstrumentSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/InstrumentSans-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/InstrumentSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/InstrumentSans-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/InstrumentSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/InstrumentSans-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/InstrumentSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/InstrumentSans-BoldItalic.ttf
          weight: 700
          style: italic

flutter_native_splash:
  color: "#1147D9"
  image: assets/images/logo.png

  android_12:
    color: "#1147D9"
    image: assets/images/logo.png
    icon_background_color: "#1AFFFFFF"
